<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px; margin: 0; padding: 16px;
      font: 13px/1.5 -apple-system, system-ui, sans-serif;
      color: #1e1b4b; background: #fff;
    }
    h1 { font-size: 15px; margin: 0 0 12px; display: flex; align-items: center; gap: 6px; }
    label { display: block; font-weight: 600; margin: 12px 0 4px; }
    select, input[type="range"] { width: 100%; box-sizing: border-box; }
    .val { float: right; font-weight: 400; color: #666; }
    .row { display: flex; gap: 8px; margin-top: 16px; }
    button {
      flex: 1; padding: 7px 0; border: 0; border-radius: 8px; cursor: pointer;
      font-weight: 600; font-size: 13px;
    }
    .preview { background: #4f46e5; color: #fff; }
    .stop { background: #eee; color: #333; }
    .hint { margin-top: 12px; font-size: 11px; color: #888; }
  </style>
</head>
<body>
  <h1>🔊 Voxlight</h1>

  <label>Voice</label>
  <select id="voice"></select>

  <label>Speed <span class="val" id="rateVal">1.0×</span></label>
  <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">

  <label>Pitch <span class="val" id="pitchVal">1.0</span></label>
  <input type="range" id="pitch" min="0.5" max="2" step="0.1" value="1">

  <div class="row">
    <button class="preview" id="preview">Preview</button>
    <button class="stop" id="stop">Stop</button>
  </div>

  <p class="hint">
    Voices marked <b>· local</b> give the most accurate word-by-word highlight.
    Usage: select text → right-click → “Read aloud with Voxlight” (or Alt+Shift+S).
  </p>

  <script src="popup.js"></script>
</body>
</html>
