<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; box-sizing: border-box; }
  body {
    width: 440px; height: 280px; overflow: hidden;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #fff;
  }
  .logo { display: flex; align-items: center; gap: 16px; }
  .glyph { font-size: 56px; }
  h1 { font-size: 46px; font-weight: 800; letter-spacing: -1px; }
  .tag { margin-top: 14px; font-size: 17px; opacity: .95; }
  .demo {
    margin-top: 22px; background: rgba(255,255,255,.14); border-radius: 10px;
    padding: 10px 18px; font-size: 17px;
  }
  .spoken { background: rgba(255,179,0,.35); border-radius: 3px; }
  .word { background: #ffb300; color: #1a1a1a; border-radius: 3px; padding: 0 3px; font-weight: 600; }
</style>
</head>
<body>
  <div class="logo"><span class="glyph">🔊</span><h1>Voxlight</h1></div>
  <div class="tag">Hear any page. See every word.</div>
  <div class="demo"><span class="spoken">Reads aloud while it</span> <span class="word">highlights</span> the words</div>
</body>
</html>
